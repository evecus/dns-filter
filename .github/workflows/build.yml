name: Build & Release

on:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ─────────────────────────────────────────────────────────────
  # Job 1: Run tests (native, fast)
  # ─────────────────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-test-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-test-

      - name: Run tests
        run: cargo test --workspace


      - name: Clippy
        run: cargo clippy --workspace -- -D warnings

  # ─────────────────────────────────────────────────────────────
  # Job 2: Build frontend
  # ─────────────────────────────────────────────────────────────
  frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: frontend
        run: npm install

      - name: Build
        working-directory: frontend
        run: npm run build

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: crates/web-api/src/dist/
          retention-days: 1

  # ─────────────────────────────────────────────────────────────
  # Job 3: Build binaries for linux/amd64 and linux/arm64
  # ─────────────────────────────────────────────────────────────
  build:
    name: Build (${{ matrix.target }})
    runs-on: ubuntu-latest
    needs: [test, frontend]

    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            artifact: amd64
            linker: musl-tools
          - target: aarch64-unknown-linux-musl
            artifact: arm64
            linker: gcc-aarch64-linux-gnu

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compile toolchain
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            ${{ matrix.linker }} musl-tools

      - name: Configure cargo for cross-compile
        run: |
          mkdir -p ~/.cargo
          cat >> ~/.cargo/config.toml << 'EOF'
          [target.aarch64-unknown-linux-musl]
          linker = "aarch64-linux-gnu-gcc"
          EOF

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-${{ matrix.target }}-

      - name: Download frontend artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: crates/web-api/src/dist/

      - name: Build dns-filter
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_LINKER: aarch64-linux-gnu-gcc
        run: |
          cargo build --release \
            --bin dns-filter \
            --bin ars-convert \
            --target ${{ matrix.target }}

      - name: Strip binaries
        run: |
          TARGET=${{ matrix.target }}
          STRIP=strip
          # Use cross-strip for arm64
          if [[ "$TARGET" == aarch64* ]]; then
            STRIP=aarch64-linux-gnu-strip
          fi
          $STRIP target/$TARGET/release/dns-filter
          $STRIP target/$TARGET/release/ars-convert

      - name: Collect artifacts
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/dns-filter  dist/dns-filter-linux-${{ matrix.artifact }}
          cp target/${{ matrix.target }}/release/ars-convert dist/ars-convert-linux-${{ matrix.artifact }}
          ls -lh dist/

      - name: Upload binaries
        uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.artifact }}
          path: dist/
          retention-days: 7

  # ─────────────────────────────────────────────────────────────
  # Job 4: Package & Release (only on version tags)
  # ─────────────────────────────────────────────────────────────
  release:
    name: Release
    runs-on: ubuntu-latest
    needs: [build]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download amd64 binaries
        uses: actions/download-artifact@v4
        with:
          name: binaries-amd64
          path: dist/

      - name: Download arm64 binaries
        uses: actions/download-artifact@v4
        with:
          name: binaries-arm64
          path: dist/

      - name: Get version
        id: ver
        run: echo "version=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT

      - name: Create release archives
        run: |
          VERSION=${{ steps.ver.outputs.version }}
          chmod +x dist/*

          # amd64 archive
          tar -czf dist/dns-filter-${VERSION}-linux-amd64.tar.gz \
            -C dist dns-filter-linux-amd64 ars-convert-linux-amd64 \
            -C $GITHUB_WORKSPACE config.example.json README.md

          # arm64 archive
          tar -czf dist/dns-filter-${VERSION}-linux-arm64.tar.gz \
            -C dist dns-filter-linux-arm64 ars-convert-linux-arm64 \
            -C $GITHUB_WORKSPACE config.example.json README.md

          # Generate checksums
          cd dist
          sha256sum dns-filter-${VERSION}-linux-amd64.tar.gz \
                    dns-filter-${VERSION}-linux-arm64.tar.gz \
                    dns-filter-linux-amd64 \
                    dns-filter-linux-arm64 \
                    ars-convert-linux-amd64 \
                    ars-convert-linux-arm64 \
            > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "dns-filter ${{ steps.ver.outputs.version }}"
          body: |
            ## dns-filter ${{ steps.ver.outputs.version }}

            ### 下载

            | 平台 | 文件 |
            |------|------|
            | Linux x86_64 | `dns-filter-${{ steps.ver.outputs.version }}-linux-amd64.tar.gz` |
            | Linux ARM64  | `dns-filter-${{ steps.ver.outputs.version }}-linux-arm64.tar.gz` |

            ### 快速开始

            ```bash
            # 1. 下载并解压
            tar -xzf dns-filter-*-linux-amd64.tar.gz

            # 2. 转换规则文件
            ./ars-convert convert blocklist.txt -o rules.ars
            # 或从 mihomo YAML
            ./ars-convert convert rules.yaml -o rules.ars

            # 3. 编辑配置
            cp config.example.json config.json
            # 修改 rulesets[0].path 指向你的 rules.ars

            # 4. 运行（需要 root 绑定 53 端口）
            sudo ./dns-filter --config config.json
            # Web UI: http://localhost:3000
            ```

            ### 变更
            ${{ github.event.head_commit.message }}
          files: |
            dist/dns-filter-${{ steps.ver.outputs.version }}-linux-amd64.tar.gz
            dist/dns-filter-${{ steps.ver.outputs.version }}-linux-arm64.tar.gz
            dist/dns-filter-linux-amd64
            dist/dns-filter-linux-arm64
            dist/ars-convert-linux-amd64
            dist/ars-convert-linux-arm64
            dist/SHA256SUMS.txt
          draft: false
          prerelease: ${{ contains(steps.ver.outputs.version, '-') }}

  # ─────────────────────────────────────────────────────────────
  # Job 5: Build & push Docker image (on tag or main push)
  # ─────────────────────────────────────────────────────────────
  docker:
    name: Docker
    runs-on: ubuntu-latest
    needs: [build]
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Download amd64 binaries
        uses: actions/download-artifact@v4
        with:
          name: binaries-amd64
          path: dist/

      - name: Download arm64 binaries
        uses: actions/download-artifact@v4
        with:
          name: binaries-arm64
          path: dist/

      - name: Set up QEMU (for multi-arch manifest)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      - name: Build and push multi-arch image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.ci
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VERSION=${{ github.ref_name }}
