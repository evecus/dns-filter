name: Build & Release

on:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ─────────────────────────────────────────────────────────────
  # Job 1: Test (native amd64, no cross needed)
  # ─────────────────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-test-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-test-

      - name: Run tests
        run: cargo test --workspace


      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings -D unused_imports -D dead_code

  # ─────────────────────────────────────────────────────────────
  # Job 2: Build frontend
  # ─────────────────────────────────────────────────────────────
  frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install & build
        working-directory: frontend
        run: npm install && npm run build

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: crates/web-api/src/dist/
          retention-days: 1

  # ─────────────────────────────────────────────────────────────
  # Job 3: Cross-compile with cargo-zigbuild
  #
  # Why zigbuild?
  #   - zig ships its own musl libc for every target, no external
  #     toolchain download needed, no network calls to musl.cc
  #   - cargo-zigbuild is available on PyPI / pip, always reachable
  #   - handles zstd-sys (and any other *-sys crate with C code)
  #     transparently because zig acts as the C compiler
  # ─────────────────────────────────────────────────────────────
  build:
    name: Build (${{ matrix.artifact }})
    runs-on: ubuntu-latest
    needs: [test, frontend]

    strategy:
      fail-fast: false
      matrix:
        include:
          - target:   x86_64-unknown-linux-musl
            artifact: amd64
          - target:   aarch64-unknown-linux-musl
            artifact: arm64

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable + target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: '0.13.0'

      - name: Install cargo-zigbuild
        run: pip install cargo-zigbuild

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-zigbuild-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-zigbuild-${{ matrix.target }}-

      - name: Download frontend artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: crates/web-api/src/dist/

      - name: Build
        run: |
          cargo zigbuild --release \
            --bin dns-filter --bin ars-convert \
            --target ${{ matrix.target }}

      - name: Strip binaries
        run: |
          strip target/${{ matrix.target }}/release/dns-filter   || true
          strip target/${{ matrix.target }}/release/ars-convert  || true

      - name: Collect artifacts
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/dns-filter  dist/dns-filter-linux-${{ matrix.artifact }}
          cp target/${{ matrix.target }}/release/ars-convert dist/ars-convert-linux-${{ matrix.artifact }}
          ls -lh dist/

      - name: Upload binaries
        uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.artifact }}
          path: dist/
          retention-days: 7

  # ─────────────────────────────────────────────────────────────
  # Job 4: Package & GitHub Release (tags only)
  # ─────────────────────────────────────────────────────────────
  release:
    name: Release
    runs-on: ubuntu-latest
    needs: [build]
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download amd64 binaries
        uses: actions/download-artifact@v4
        with:
          name: binaries-amd64
          path: dist/

      - name: Download arm64 binaries
        uses: actions/download-artifact@v4
        with:
          name: binaries-arm64
          path: dist/

      - name: Get version
        id: ver
        run: echo "version=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT

      - name: Create release archives
        run: |
          VERSION=${{ steps.ver.outputs.version }}
          chmod +x dist/*

          tar -czf dist/dns-filter-${VERSION}-linux-amd64.tar.gz \
            -C dist dns-filter-linux-amd64 ars-convert-linux-amd64 \
            -C $GITHUB_WORKSPACE config.example.json README.md

          tar -czf dist/dns-filter-${VERSION}-linux-arm64.tar.gz \
            -C dist dns-filter-linux-arm64 ars-convert-linux-arm64 \
            -C $GITHUB_WORKSPACE config.example.json README.md

          cd dist
          sha256sum \
            dns-filter-${VERSION}-linux-amd64.tar.gz \
            dns-filter-${VERSION}-linux-arm64.tar.gz \
            dns-filter-linux-amd64 dns-filter-linux-arm64 \
            ars-convert-linux-amd64 ars-convert-linux-arm64 \
            > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v0.1.0
          name: dns-filter v0.1.0
          body: |
            ## dns-filter v0.1.0

            ```bash
            tar -xzf dns-filter-*-linux-amd64.tar.gz
            ./ars-convert convert blocklist.txt -o rules.ars
            cp config.example.json config.json
            sudo ./dns-filter --config config.json
            # Web UI: http://localhost:3000
          files: |
            dist/dns-filter-linux-amd64
            dist/dns-filter-linux-arm64
            dist/ars-convert-linux-amd64
            dist/ars-convert-linux-arm64
            dist/SHA256SUMS.txt
          draft: false
          prerelease: ${{ contains(steps.ver.outputs.version, '-') }}
